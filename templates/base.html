<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TNEA College Advisor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Navbar ───────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">TNEA <span class="logo-accent">Advisor</span></span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/recommend" class="nav-link nav-cta">Get Recommendations</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </nav>

  <!-- ── Page content ─────────────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-inner">
      <p>TNEA College Advisor &nbsp;·&nbsp; Data: 2022–2024 Vocational Cutoffs</p>
      <p class="footer-note">For guidance only. Always verify with official TNEA sources.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
